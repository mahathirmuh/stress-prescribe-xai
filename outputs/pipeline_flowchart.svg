<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1460 2080" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#2b2b2b"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#c0392b"/>
    </marker>
    <marker id="arrowGold" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#b8932f"/>
    </marker>
    <style>
      .title  { font-weight: 700; }
      .body   { fill: #2b2b2b; }
      .muted  { fill: #4a4a4a; }
      .lbl    { font-weight: 700; font-size: 16px; }
      .stagetag { font-weight: 700; font-size: 13px; letter-spacing: 1px; }
    </style>
  </defs>

  <rect width="1460" height="2080" fill="#ffffff"/>

  <!-- ============ MAIN COLUMN ============ -->

  <!-- DATA -->
  <rect x="320" y="40" width="500" height="80" rx="40" fill="#3f3f3f"/>
  <text x="570" y="72" text-anchor="middle" class="title" font-size="20" fill="#fff">Sleep &amp; Lifestyle Data</text>
  <text x="570" y="98" text-anchor="middle" font-size="15" fill="#d8d8d8">100k × 32 features · target stress_score</text>
  <line x1="570" y1="120" x2="570" y2="158" stroke="#2b2b2b" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- PREPROCESS -->
  <g>
    <rect x="320" y="162" width="500" height="92" rx="10" fill="#fff" stroke="#3f3f3f" stroke-width="2.5"/>
    <rect x="320" y="162" width="500" height="32" rx="10" fill="#3f3f3f"/>
    <rect x="320" y="178" width="500" height="16" fill="#3f3f3f"/>
    <text x="570" y="184" text-anchor="middle" class="title" font-size="15" fill="#fff" letter-spacing="1">PREPROCESS</text>
    <text x="570" y="220" text-anchor="middle" font-size="14" class="muted">drop 4 leakage feats · Version A/B encoding</text>
    <text x="570" y="240" text-anchor="middle" font-size="14" class="muted">70/15/15 stratified split</text>
  </g>

  <!-- STAGE 1 tag -->
  <text x="320" y="290" class="stagetag" fill="#52677d">STAGE 1 · PREDICT</text>

  <!-- split arrows to 3 models -->
  <line x1="570" y1="254" x2="570" y2="270" stroke="#2b2b2b" stroke-width="2.5"/>
  <path d="M570,270 H210 V326" fill="none" stroke="#2b2b2b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M570,270 V326" fill="none" stroke="#2b2b2b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M570,270 H930 V326" fill="none" stroke="#2b2b2b" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- model cards -->
  <g>
    <rect x="70" y="330" width="280" height="92" rx="10" fill="#fff" stroke="#4a6fa5" stroke-width="2.5"/>
    <rect x="70" y="330" width="280" height="32" rx="10" fill="#4a6fa5"/>
    <rect x="70" y="346" width="280" height="16" fill="#4a6fa5"/>
    <text x="210" y="352" text-anchor="middle" class="title" font-size="15" fill="#fff">CatBoost</text>
    <text x="210" y="392" text-anchor="middle" font-size="14" class="muted">1000 it · d6 · lr .05</text>
  </g>
  <g>
    <rect x="430" y="330" width="280" height="92" rx="10" fill="#fff" stroke="#4a6fa5" stroke-width="2.5"/>
    <rect x="430" y="330" width="280" height="32" rx="10" fill="#4a6fa5"/>
    <rect x="430" y="346" width="280" height="16" fill="#4a6fa5"/>
    <text x="570" y="352" text-anchor="middle" class="title" font-size="15" fill="#fff">Random Forest</text>
    <text x="570" y="392" text-anchor="middle" font-size="14" class="muted">300 trees · leaf 5</text>
  </g>
  <g>
    <rect x="790" y="330" width="280" height="92" rx="10" fill="#fff" stroke="#4a6fa5" stroke-width="2.5"/>
    <rect x="790" y="330" width="280" height="32" rx="10" fill="#4a6fa5"/>
    <rect x="790" y="346" width="280" height="16" fill="#4a6fa5"/>
    <text x="930" y="352" text-anchor="middle" class="title" font-size="15" fill="#fff">TabNet</text>
    <text x="930" y="392" text-anchor="middle" font-size="14" class="muted">≤200 ep · bs 1024</text>
  </g>

  <!-- merge arrows to CV -->
  <path d="M210,422 V452 H570" fill="none" stroke="#2b2b2b" stroke-width="2.5"/>
  <path d="M930,422 V452 H570" fill="none" stroke="#2b2b2b" stroke-width="2.5"/>
  <line x1="570" y1="422" x2="570" y2="494" stroke="#2b2b2b" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- CV / SELECT BEST -->
  <g>
    <rect x="320" y="498" width="500" height="92" rx="10" fill="#fff" stroke="#4a6fa5" stroke-width="2.5"/>
    <rect x="320" y="498" width="500" height="32" rx="10" fill="#4a6fa5"/>
    <rect x="320" y="514" width="500" height="16" fill="#4a6fa5"/>
    <text x="570" y="520" text-anchor="middle" class="title" font-size="15" fill="#fff" letter-spacing="1">5-FOLD CV · SELECT BEST</text>
    <text x="570" y="558" text-anchor="middle" font-size="14" class="muted">→ CatBoost (R² 0.650 · RMSE 0.952 · MAE 0.758)</text>
  </g>
  <line x1="570" y1="590" x2="570" y2="628" stroke="#2b2b2b" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- STAGE 2 tag -->
  <text x="320" y="624" class="stagetag" fill="#52677d">STAGE 2 · EXPLAIN</text>

  <!-- SHAP -->
  <g>
    <rect x="320" y="632" width="500" height="92" rx="10" fill="#fff" stroke="#52677d" stroke-width="2.5"/>
    <rect x="320" y="632" width="500" height="32" rx="10" fill="#52677d"/>
    <rect x="320" y="648" width="500" height="16" fill="#52677d"/>
    <text x="570" y="654" text-anchor="middle" class="title" font-size="15" fill="#fff" letter-spacing="1">SHAP ATTRIBUTION</text>
    <text x="570" y="690" text-anchor="middle" font-size="14" class="muted">TreeExplainer (2000) → global mean|SHAP|</text>
    <text x="570" y="710" text-anchor="middle" font-size="14" class="muted">+ local waterfall plots</text>
  </g>
  <line x1="570" y1="724" x2="570" y2="760" stroke="#2b2b2b" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- DOMAIN SIGN CHECK -->
  <g>
    <rect x="320" y="764" width="500" height="76" rx="10" fill="#fff" stroke="#52677d" stroke-width="2.5"/>
    <rect x="320" y="764" width="500" height="32" rx="10" fill="#52677d"/>
    <rect x="320" y="780" width="500" height="16" fill="#52677d"/>
    <text x="570" y="786" text-anchor="middle" class="title" font-size="15" fill="#fff" letter-spacing="1">DOMAIN SIGN-CHECK ✓</text>
    <text x="570" y="824" text-anchor="middle" font-size="14" class="muted">directional signs vs sleep medicine (r = −0.996)</text>
  </g>
  <line x1="570" y1="840" x2="570" y2="876" stroke="#2b2b2b" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- STAGE 3 tag -->
  <text x="320" y="872" class="stagetag" fill="#52677d">STAGE 3 · PRESCRIBE</text>

  <!-- DICE -->
  <g>
    <rect x="320" y="880" width="500" height="92" rx="10" fill="#fff" stroke="#52677d" stroke-width="2.5"/>
    <rect x="320" y="880" width="500" height="32" rx="10" fill="#52677d"/>
    <rect x="320" y="896" width="500" height="16" fill="#52677d"/>
    <text x="570" y="902" text-anchor="middle" class="title" font-size="15" fill="#fff" letter-spacing="1">DiCE COUNTERFACTUALS</text>
    <text x="570" y="938" text-anchor="middle" font-size="14" class="muted">group: behavior / outcome / immutable</text>
    <text x="570" y="958" text-anchor="middle" font-size="14" class="muted">genetic search, behavior-only · permitted_range</text>
  </g>
  <line x1="570" y1="972" x2="570" y2="1008" stroke="#2b2b2b" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- 5 CF METRICS -->
  <g>
    <rect x="320" y="1012" width="500" height="76" rx="10" fill="#fff" stroke="#52677d" stroke-width="2.5"/>
    <rect x="320" y="1012" width="500" height="32" rx="10" fill="#52677d"/>
    <rect x="320" y="1028" width="500" height="16" fill="#52677d"/>
    <text x="570" y="1034" text-anchor="middle" class="title" font-size="15" fill="#fff" letter-spacing="1">COMPUTE 5 CF METRICS</text>
    <text x="570" y="1072" text-anchor="middle" font-size="14" class="muted">validity · proximity · sparsity · diversity · plausibility</text>
  </g>
  <line x1="570" y1="1088" x2="570" y2="1128" stroke="#2b2b2b" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- DECISION 1: CF valid? -->
  <polygon points="570,1132 760,1262 570,1392 380,1262" fill="#5a6b82" stroke="#3f4d5e" stroke-width="2"/>
  <text x="570" y="1256" text-anchor="middle" class="title" font-size="16" fill="#ffffff">Counterfactual</text>
  <text x="570" y="1278" text-anchor="middle" class="title" font-size="16" fill="#ffffff">valid?</text>
  <text x="595" y="1410" class="lbl" fill="#2f8f4e">Yes</text>
  <line x1="570" y1="1392" x2="570" y2="1438" stroke="#2b2b2b" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- STAGE 4 tag -->
  <text x="320" y="1434" class="stagetag" fill="#52677d">STAGE 4 · NATURALIZE</text>

  <!-- NATURALIZE -->
  <g>
    <rect x="320" y="1442" width="500" height="92" rx="10" fill="#fff" stroke="#52677d" stroke-width="2.5"/>
    <rect x="320" y="1442" width="500" height="32" rx="10" fill="#52677d"/>
    <rect x="320" y="1458" width="500" height="16" fill="#52677d"/>
    <text x="570" y="1464" text-anchor="middle" class="title" font-size="15" fill="#fff" letter-spacing="1">LLM NATURALIZE (GPT-4o-mini)</text>
    <text x="570" y="1500" text-anchor="middle" font-size="14" class="muted">counselor system prompt + CF facts</text>
    <text x="570" y="1520" text-anchor="middle" font-size="14" class="muted">T = 0.3 · JSON · 5 fields</text>
  </g>
  <line x1="570" y1="1534" x2="570" y2="1574" stroke="#2b2b2b" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- DECISION 2: Validation pass? -->
  <polygon points="570,1578 760,1700 570,1822 380,1700" fill="#5a6b82" stroke="#3f4d5e" stroke-width="2"/>
  <text x="570" y="1694" text-anchor="middle" class="title" font-size="16" fill="#ffffff">Validation pass?</text>
  <text x="570" y="1716" text-anchor="middle" font-size="13" fill="#ffffff">safety · faithful · struct</text>
  <text x="595" y="1840" class="lbl" fill="#2f8f4e">Yes</text>
  <line x1="570" y1="1822" x2="570" y2="1866" stroke="#2b2b2b" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- OUTPUT -->
  <rect x="320" y="1870" width="500" height="90" rx="45" fill="#3f3f3f"/>
  <text x="570" y="1908" text-anchor="middle" class="title" font-size="18" fill="#fff">NARRATIVE RECOMMENDATION</text>
  <text x="570" y="1934" text-anchor="middle" font-size="14" fill="#d8d8d8">actionable · empathetic · Bahasa Indonesia</text>

  <!-- ============ RIGHT SIDE ARTIFACTS & LOOPS ============ -->

  <!-- SHAP values artifact -->
  <polygon points="990,640 1340,640 1300,716 950,716" fill="#fdf6e3" stroke="#b8932f" stroke-width="2"/>
  <text x="1145" y="672" text-anchor="middle" font-size="14" font-style="italic" fill="#7a6420">SHAP values</text>
  <text x="1145" y="692" text-anchor="middle" font-size="14" font-style="italic" fill="#7a6420">(global + local)</text>
  <line x1="820" y1="678" x2="946" y2="678" stroke="#b8932f" stroke-width="2" marker-end="url(#arrowGold)"/>

  <!-- candidate counterfactuals artifact -->
  <polygon points="990,1012 1340,1012 1300,1088 950,1088" fill="#fdf6e3" stroke="#b8932f" stroke-width="2"/>
  <text x="1145" y="1044" text-anchor="middle" font-size="14" font-style="italic" fill="#7a6420">candidate</text>
  <text x="1145" y="1064" text-anchor="middle" font-size="14" font-style="italic" fill="#7a6420">counterfactuals</text>
  <line x1="820" y1="1050" x2="946" y2="1050" stroke="#b8932f" stroke-width="2" marker-end="url(#arrowGold)"/>

  <!-- Relax target box -->
  <rect x="990" y="1212" width="290" height="100" rx="14" fill="#fbe9e7" stroke="#c0392b" stroke-width="2"/>
  <text x="1135" y="1256" text-anchor="middle" class="title" font-size="15" fill="#922">Relax target</text>
  <text x="1135" y="1280" text-anchor="middle" font-size="14" fill="#922">−0.30 → −0.15 → −0.05</text>
  <!-- No from CF-valid decision -->
  <text x="855" y="1252" text-anchor="middle" class="lbl" fill="#c0392b">No</text>
  <line x1="760" y1="1262" x2="986" y2="1262" stroke="#c0392b" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <!-- relax & re-run loop up to DiCE — routed right of artifacts to avoid collision -->
  <text x="1340" y="1115" text-anchor="end" class="lbl" fill="#c0392b">relax</text>
  <text x="1340" y="1135" text-anchor="end" class="lbl" fill="#c0392b">&amp; re-run</text>
  <path d="M1280,1262 H1360 V926 H824" fill="none" stroke="#c0392b" stroke-width="2.5" marker-end="url(#arrowRed)"/>

  <!-- JSON output artifact -->
  <polygon points="990,1448 1340,1448 1300,1524 950,1524" fill="#fdf6e3" stroke="#b8932f" stroke-width="2"/>
  <text x="1145" y="1480" text-anchor="middle" font-size="14" font-style="italic" fill="#7a6420">JSON output</text>
  <text x="1145" y="1500" text-anchor="middle" font-size="14" font-style="italic" fill="#7a6420">(5 fields)</text>
  <line x1="950" y1="1488" x2="824" y2="1488" stroke="#c0392b" stroke-width="2.5" marker-end="url(#arrowRed)"/>

  <!-- DECISION 3: retries < 3 -->
  <polygon points="1145,1620 1310,1700 1145,1780 980,1700" fill="#5a6b82" stroke="#3f4d5e" stroke-width="2"/>
  <text x="1145" y="1696" text-anchor="middle" class="title" font-size="15" fill="#ffffff">retries</text>
  <text x="1145" y="1718" text-anchor="middle" class="title" font-size="15" fill="#ffffff">&lt; 3?</text>
  <!-- No from validation-pass to retries -->
  <text x="868" y="1690" text-anchor="middle" class="lbl" fill="#c0392b">No</text>
  <line x1="760" y1="1700" x2="976" y2="1700" stroke="#c0392b" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <!-- retry Yes up to JSON output -->
  <text x="1228" y="1576" text-anchor="middle" class="lbl" fill="#c0392b">retry (Yes)</text>
  <line x1="1145" y1="1620" x2="1145" y2="1528" stroke="#c0392b" stroke-width="2.5" marker-end="url(#arrowRed)"/>

  <!-- Dummy fallback -->
  <rect x="1000" y="1870" width="290" height="90" rx="14" fill="#fbe9e7" stroke="#c0392b" stroke-width="2"/>
  <text x="1145" y="1910" text-anchor="middle" class="title" font-size="15" fill="#922">Dummy</text>
  <text x="1145" y="1932" text-anchor="middle" class="title" font-size="15" fill="#922">fallback</text>
  <!-- No from retries down to dummy -->
  <text x="1175" y="1830" text-anchor="middle" class="lbl" fill="#c0392b">No</text>
  <line x1="1145" y1="1780" x2="1145" y2="1866" stroke="#c0392b" stroke-width="2.5" stroke-dasharray="7,5" marker-end="url(#arrowRed)"/>
  <!-- fallback dashed to output -->
  <text x="905" y="1900" text-anchor="middle" font-size="14" font-style="italic" fill="#c0392b">fallback</text>
  <line x1="1000" y1="1915" x2="824" y2="1915" stroke="#c0392b" stroke-width="2.5" stroke-dasharray="7,5" marker-end="url(#arrowRed)"/>

</svg>
